<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Licencias</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="header">

        <div class="container d-flex align-items-center justify-content-center position-relative">

            <img src="logo.png" alt="Logo Municipalidad" class="logo">

            <h1 class="m-0">
                Licencia de Funcionamiento
            </h1>

        </div>

    </header>


    <!-- CONTENIDO -->
    <main class="container mt-5">

        <div class="container-consulta shadow-lg">

            <h2 class="h2-consulta">
                Consulta RUC o DNI
            </h2>

            <form>

                <label class="label-consulta" for="tipoDocumento">
                    Selecciona el tipo de consulta:
                </label>

                <select id="tipoDocumento" class="input-text-consulta" required>

                    <option value="">Seleccione</option>

                    <option value="ruc">RUC</option>

                    <option value="dni">DNI</option>

                </select>


                <label>Número de Documento:</label>

                <input type="text" class="input-text-consulta" id="numeroDocumento" required placeholder="Ingrese número de documento">
                <div id="mensajeError" class="mensaje-error"></div>

                <!-- BOTONES -->
                <button type="submit" class="w-100 input-submit-consulta">
                    Consultar
                </button>

                <button
                    type="button"
                    class="w-100 input-submit-consulta mt-2"
                    onclick="limpiarFormulario()"
                >
                    Limpiar
                </button>

            </form>


            <!-- RESULTADOS -->
            <div class="resultado-consulta">

                <!-- RESULTADOS RUC -->
                <div id="rucResults" class="hidden">

                    <label class="label-consulta">
                        Razón Social:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="razonSocial" readonly>


                    <label class="label-consulta">
                        Número de Licencia:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="numeroDeLicencia" readonly>


                    <label class="label-consulta">
                        Fecha Emitida:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="fechaEmitida" readonly>


                    <label class="label-consulta">
                        Administrado:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="administrado" readonly>


                    <label class="label-consulta">
                        Lugar:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="lugar" readonly>


                    <label class="label-consulta">
                        Giro:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="giro" readonly>

                </div>


                <!-- RESULTADOS DNI -->
                <div id="dniResults" class="hidden">

                    <label class="label-consulta">
                        Nombres:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="nombres" readonly>


                    <label class="label-consulta">
                        Apellidos:
                    </label>

                    <input type="text" class="input-text-consulta readonly" id="apellidos" readonly>

                </div>

            </div>

        </div>

    </main>


    <!-- FOOTER -->
    <footer class="footer">

        <div class="container text-center">

            <p class="mb-0">
                © 2026 Municipalidad de Barranca
            </p>

            <small>
                Sistema de Licencia de Funcionamiento
            </small>

        </div>

    </footer>


    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
